# ─── Identificação do projeto ───────────────────────────────────────────────
sonar.projectKey=gview
sonar.projectName=Gview
sonar.projectVersion=2.0.0

# ─── Fontes analisadas ──────────────────────────────────────────────────────
sonar.sources=frontend/src,backend/src
sonar.tests=frontend/src/tests,frontend/e2e,backend/tests

# ─── Exclusões ──────────────────────────────────────────────────────────────
# Arquivos gerados (relatórios de cobertura, assets HTML do Istanbul/Vitest)
sonar.exclusions=\
  frontend/coverage/**,\
  frontend/dist/**,\
  backend/coverage/**,\
  backend/prisma/prisma/**,\
  **/node_modules/**,\
  **/*.css,\
  frontend/src/services/mockData.js

# Exclusões específicas de duplicação
# mockData.js é intencional (dados de seed); coverage/* é gerado automaticamente
sonar.cpd.exclusions=\
  frontend/coverage/**,\
  frontend/src/services/mockData.js,\
  backend/tests/**

# ─── Cobertura ──────────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.testExecutionReportPaths=

# ─── Encoding ───────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
